<!doctype html>
<html lang="en" data-bs-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GR6{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-dark sticky-top mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ manager_url }}">GR6</a>
      <div class="navbar-nav">
        {% block navlinks %}
        {% if pages|default([]) %}
        <div class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            {{ current_title|default('Pages') }}
          </a>
          <ul class="dropdown-menu dropdown-menu-dark">
            {% for slug, title in pages %}
            <li>
              <a class="dropdown-item {{ 'active' if slug == current_slug else '' }}"
                 href="{{ '/' if slug == index_slug else '/pages/' + slug }}">{{ title }}</a>
            </li>
            {% endfor %}
          </ul>
        </div>
        {% endif %}
        {% endblock %}
      </div>
      <div class="navbar-nav ms-auto flex-row gap-2 align-items-center">
        {% block statusbadges %}
        <span id="sys-brownout" class="badge text-bg-secondary" title="Power / brown-out">&mdash;</span>
        <span id="sys-wifi" class="badge text-bg-secondary" title="Wifi signal">&mdash;</span>
        <span id="sys-cpu" class="badge text-bg-secondary" title="CPU load">&mdash;</span>
        {% endblock %}
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/ws-utils.js"></script>
  <script>const MANAGER_URL = "{{ manager_url }}";</script>
  <script src="/static/sysstatus.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
