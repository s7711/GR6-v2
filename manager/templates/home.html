{% extends "manager-base.html" %}
{% block title %}GR6 Manager — Home{% endblock %}
{% block content %}
<div class="row row-cols-2 row-cols-md-4 g-4">
  {% for tile in tiles %}
  <div class="col text-center">
    <a href="{{ tile.url or '#' }}" class="text-decoration-none text-body">
      {% if tile.icon %}
        <img src="{{ tile.icon }}" alt="{{ tile.name }}" width="64" height="64" class="rounded">
      {% else %}
        <div class="border rounded d-inline-flex align-items-center justify-content-center"
             style="width:64px;height:64px;">&nbsp;</div>
      {% endif %}
      <div class="mt-2">{{ tile.name }}</div>
    </a>
  </div>
  {% endfor %}
</div>
{% endblock %}
