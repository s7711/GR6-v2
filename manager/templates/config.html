{% extends "manager-base.html" %}
{% block title %}GR6 Manager — Config{% endblock %}
{% block content %}
<p class="text-body-secondary">
  Edits take effect only after restarting the affected service(s) from the
  <a href="/services">Services</a> page — services read this file at startup only.
</p>
{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}
<form method="post">
  <textarea name="config_text" class="form-control font-monospace mb-3" rows="24" spellcheck="false">{{ config_text }}</textarea>
  <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
